version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: preconf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: preconfirmation_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: preconf_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@preconf.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: preconf_gateway
    restart: unless-stopped
    ports:
      - "8080:8080"  # JSON-RPC API
      - "9090:9090"  # Prometheus metrics
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/preconfirmation_gateway
      BEACON_API_ENDPOINT: ${BEACON_API_ENDPOINT}
      COMMITTER_PRIVATE_KEY: ${COMMITTER_PRIVATE_KEY}
      BLS_PRIVATE_KEY: ${BLS_PRIVATE_KEY}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.toml:/app/config.toml:ro

volumes:
  postgres_data:
  pgadmin_data: